<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="45" fill="#2B7A7F"/>

  <!-- Main curved "D" shape -->
  <path d="M 35 25
           L 100 25
           Q 175 25 175 100
           Q 175 175 100 175
           L 35 175
           Z"
        fill="white"/>

  <!-- Inner curved cutout forming "CM" -->
  <path d="M 75 60
           L 100 60
           Q 140 60 140 100
           Q 140 140 100 140
           L 75 140
           Z"
        fill="#2B7A7F"/>

  <!-- Middle vertical line -->
  <rect x="75" y="85" width="15" height="60" fill="white" rx="2"/>

  <!-- Checkmark/Arrow accent -->
  <path d="M 110 90 L 125 105 L 155 70"
        stroke="white"
        stroke-width="12"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
