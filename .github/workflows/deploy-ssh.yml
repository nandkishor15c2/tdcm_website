name: Deploy to Hostinger (SSH)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tdcm-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./tdcm-frontend
        run: npm ci

      - name: Build project
        working-directory: ./tdcm-frontend
        run: npm run build

      - name: Deploy to Hostinger via SSH
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT || 22 }}
          SOURCE: "tdcm-frontend/dist/"
          TARGET: ${{ secrets.REMOTE_TARGET || '/home/username/public_html' }}
          EXCLUDE: "/node_modules/, /.git/, /.github/, /.DS_Store"
          SCRIPT_BEFORE: |
            whoami
            ls -al
          SCRIPT_AFTER: |
            echo "Deployment completed successfully!"
            ls -al ${{ secrets.REMOTE_TARGET || '/home/username/public_html' }}

      - name: Deployment Status
        if: success()
        run: echo "✅ SSH Deployment successful!"
